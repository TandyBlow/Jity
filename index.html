<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>失忆档案 — AI跑团</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0a0806;
      --bg-panel: rgba(8, 6, 4, 0.82);
      --text-main: #c8bfad;
      --text-dim: #7a7060;
      --text-accent: #d4a96a;
      --text-speaker: #9eb89a;
      --border: rgba(180, 150, 90, 0.18);
      --sanity-color: #7ec8a0;
      --red: #c04040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Noto Serif SC', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 背景图层 */
    #background {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) contrast(1.1) sepia(0.3);
    }
    #bg-default {
      background: radial-gradient(ellipse at 30% 40%, #1a1208 0%, #080604 100%);
    }

    /* 顶部暗角遮罩 */
    #image-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 35%, transparent 55%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    /* 图片加载指示 */
    #image-loading-dot {
      display: none;
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 10;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-accent);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }

    /* 状态栏 */
    #stats {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      gap: 24px;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .stat-label { min-width: 28px; }
    .stat-track {
      width: 80px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease, background-color 0.6s ease;
    }
    #sanity-bar { background: var(--sanity-color); width: 80%; }
    #health-bar { background: #c06060; width: 100%; }
    .stat-val {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      color: var(--text-accent);
      min-width: 24px;
    }

    /* 主内容区 */
    #main {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 60px 0 0 0;
    }

    /* 叙事区 */
    #story-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 28px 16px;
      overflow: hidden;
    }

    #narration {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-main);
      margin-bottom: 16px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      max-height: 120px;
      overflow: hidden;
    }

    #dialogue {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .dialogue-line {
      font-size: 13.5px;
      line-height: 1.7;
      padding: 6px 10px;
      border-left: 2px solid var(--border);
      background: rgba(0,0,0,0.3);
    }
    .speaker {
      color: var(--text-speaker);
      font-size: 12px;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }
    .speech { color: var(--text-main); }

    /* 选项 */
    #options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .option-btn {
      background: rgba(10, 8, 6, 0.75);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      padding: 9px 14px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      animation: fadeUp 0.35s ease both;
    }
    .option-btn:hover {
      background: rgba(212, 169, 106, 0.12);
      border-color: rgba(180, 150, 90, 0.5);
      color: var(--text-accent);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 输入区 */
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--bg-panel);
      padding: 10px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #player-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      resize: none;
      height: 36px;
      line-height: 36px;
      caret-color: var(--text-accent);
    }
    #player-input::placeholder { color: var(--text-dim); }
    #send-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Serif SC', serif;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) {
      border-color: var(--text-accent);
      color: var(--text-accent);
    }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 加载遮罩 */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading-text {
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      animation: flicker 2s infinite;
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.3; }
    }

    /* 游戏结束 */
    #game-over {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0,0,0,0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .game-over-title {
      font-family: 'IM Fell English', serif;
      font-size: 32px;
      color: var(--red);
      letter-spacing: 0.15em;
    }
    .game-over-reason {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      max-width: 320px;
      line-height: 1.8;
    }
    #restart-btn {
      background: none;
      border: 1px solid rgba(180,150,90,0.3);
      color: var(--text-accent);
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all 0.2s;
    }
    #restart-btn:hover { background: rgba(212,169,106,0.1); }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

  <!-- 背景 -->
  <div id="background">
    <div id="bg-default" class="bg-layer"></div>
  </div>
  <div id="image-overlay"></div>
  <div id="image-loading-dot"></div>

  <!-- 状态栏 -->
  <div id="stats">
    <div class="stat-item">
      <span class="stat-label">理智</span>
      <div class="stat-track"><div class="stat-bar" id="sanity-bar"></div></div>
      <span class="stat-val" id="sanity-val">80</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">生命</span>
      <div class="stat-track"><div class="stat-bar" id="health-bar"></div></div>
      <span class="stat-val" id="health-val">100</span>
    </div>
  </div>

  <!-- 主内容 -->
  <div id="main">
    <div id="story-area">
      <div id="narration">正在连接档案……</div>
      <div id="dialogue"></div>
      <div id="options"></div>
    </div>
    <div id="input-area">
      <textarea id="player-input" placeholder="输入你的行动，或按 Enter 发送……" rows="1"></textarea>
      <button id="send-btn">行动</button>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading-overlay">
    <span class="loading-text">thinking...</span>
  </div>

  <!-- 游戏结束 -->
  <div id="game-over">
    <div class="game-over-title">THE END</div>
    <div class="game-over-reason"></div>
    <button id="restart-btn" onclick="location.reload()">重新开始</button>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      UI.init();
      Game.start();
    });
  </script>

</body>
</html>
